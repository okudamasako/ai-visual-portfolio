<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #fff;
      color: #2a2a2a;
      font-family: 'Noto Sans JP', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      padding: 60px 24px 80px;
    }

    header {
      text-align: center;
      margin-bottom: 56px;
      animation: fadeUp 0.8s ease both;
    }

    header h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(2rem, 5vw, 3rem);
      letter-spacing: 0.2em;
    }

    header p {
      margin-top: 10px;
      font-size: 0.75rem;
      letter-spacing: 0.25em;
      color: #aaa;
      text-transform: uppercase;
    }

    .divider {
      width: 36px;
      height: 1px;
      background: #b0956e;
      margin: 16px auto 0;
      animation: fadeUp 0.8s 0.15s ease both;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
      max-width: 1100px;
      margin: 0 auto;
    }

    @media (max-width: 768px) {
      .grid { grid-template-columns: repeat(2, 1fr); gap: 16px; }
    }

    @media (max-width: 480px) {
      .grid { grid-template-columns: 1fr; gap: 16px; }
      body { padding: 40px 16px 60px; }
    }

    .card {
      overflow: hidden;
      border-radius: 6px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.09), 0 1px 4px rgba(0,0,0,0.06);
      cursor: pointer;
      transition: transform 0.35s ease, box-shadow 0.35s ease;
      animation: fadeUp 0.7s ease both;
      aspect-ratio: 3 / 4;
    }

    .card:nth-child(1) { animation-delay: 0.10s; }
    .card:nth-child(2) { animation-delay: 0.18s; }
    .card:nth-child(3) { animation-delay: 0.26s; }
    .card:nth-child(4) { animation-delay: 0.34s; }
    .card:nth-child(5) { animation-delay: 0.42s; }
    .card:nth-child(6) { animation-delay: 0.50s; }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 32px rgba(0,0,0,0.13), 0 2px 8px rgba(0,0,0,0.07);
    }

    .card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.5s ease;
    }

    .card:hover img { transform: scale(1.04); }

    footer {
      text-align: center;
      margin-top: 60px;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      color: #ccc;
      text-transform: uppercase;
      animation: fadeUp 0.8s 0.6s ease both;
    }

    .lb-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      padding: 24px;
      cursor: zoom-out;
    }

    .lb-overlay.active { display: flex; }

    .lb-overlay img {
      max-width: 92vw;
      max-height: 92vh;
      object-fit: contain;
      border-radius: 4px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      cursor: default;
      animation: lbIn 0.25s ease both;
    }

    .lb-close {
      position: fixed;
      top: 20px;
      right: 24px;
      background: none;
      border: none;
      color: #fff;
      font-size: 2rem;
      cursor: pointer;
      line-height: 1;
      opacity: 0.8;
      transition: opacity 0.2s;
      z-index: 1001;
    }

    .lb-close:hover { opacity: 1; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes lbIn {
      from { opacity: 0; transform: scale(0.94); }
      to   { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>

  <header>
    <h1>Portfolio</h1>
    <p>Photography &amp; Visual Work</p>
  </header>
  <div class="divider"></div>

  <div class="grid">
    <div class="card" onclick="openLb(this)">
      <img src="0502_07.png" alt="Portfolio image 1">
    </div>
    <div class="card" onclick="openLb(this)">
      <img src="0507_07.png" alt="Portfolio image 2">
    </div>
    <div class="card" onclick="openLb(this)">
      <img src="0411_07.png" alt="Portfolio image 3">
    </div>
    <div class="card" onclick="openLb(this)">
      <img src="0425_07.png" alt="Portfolio image 4">
    </div>
    <div class="card" onclick="openLb(this)">
      <img src="0404_07.png" alt="Portfolio image 5">
    </div>
    <div class="card" onclick="openLb(this)">
      <img src="0407_07.png" alt="Portfolio image 6">
    </div>
  </div>

  <footer>&copy; 2026 &nbsp;&middot;&nbsp; All Rights Reserved</footer>

  <div class="lb-overlay" id="lb" onclick="closeLb()">
    <button class="lb-close" onclick="closeLb()">&#x2715;</button>
    <img id="lb-img" src="" alt="" onclick="event.stopPropagation()">
  </div>

  <script>
    function openLb(card) {
      const src = card.querySelector('img').src;
      const alt = card.querySelector('img').alt;
      document.getElementById('lb-img').src = src;
      document.getElementById('lb-img').alt = alt;
      document.getElementById('lb').classList.add('active');
      document.body.style.overflow = 'hidden';
    }
    function closeLb() {
      document.getElementById('lb').classList.remove('active');
      document.body.style.overflow = '';
    }
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLb(); });
  </script>

</body>
</html>
